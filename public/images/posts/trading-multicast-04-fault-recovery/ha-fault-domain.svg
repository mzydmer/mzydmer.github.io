<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">High Availability Fault Domain</title>
  <desc id="desc">High availability deployment isolates line, host, NIC, publisher, and downstream fault domains.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
    </marker>
    <style>
      .bg { fill: #0b1120; }
      .title { fill: #f8fafc; font: 700 34px Arial, sans-serif; }
      .sub { fill: #94a3b8; font: 18px Arial, sans-serif; }
      .box { fill: #111827; stroke: #60a5fa; stroke-width: 2; rx: 16; }
      .green { fill: #0f2f24; stroke: #22c55e; stroke-width: 2; rx: 16; }
      .orange { fill: #2a1e10; stroke: #f59e0b; stroke-width: 2; rx: 16; }
      .red { fill: #2f1116; stroke: #fb7185; stroke-width: 2; rx: 16; }
      .label { fill: #e2e8f0; font: 700 18px Arial, sans-serif; }
      .txt { fill: #cbd5e1; font: 15px Arial, sans-serif; }
      .line { stroke: #93c5fd; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1320" height="760"/>
  <text x="56" y="62" class="title">High availability is fault-domain isolation</text>
  <text x="56" y="96" class="sub">More processes are not enough; isolate line, host, NIC, switch port, publisher, and downstream risk.</text>

  <rect x="70" y="165" width="180" height="90" class="box"/>
  <text x="115" y="202" class="label">Feed A</text>
  <text x="98" y="230" class="txt">Line / NIC / route</text>

  <rect x="70" y="385" width="180" height="90" class="box"/>
  <text x="115" y="422" class="label">Feed B</text>
  <text x="98" y="450" class="txt">Line / NIC / route</text>

  <rect x="350" y="135" width="245" height="150" class="green"/>
  <text x="385" y="178" class="label">Receiver Node 1</text>
  <text x="385" y="210" class="txt">receive + parse + state</text>
  <text x="385" y="236" class="txt">trust status exposed</text>

  <rect x="350" y="355" width="245" height="150" class="green"/>
  <text x="385" y="398" class="label">Receiver Node 2</text>
  <text x="385" y="430" class="txt">receive + parse + state</text>
  <text x="385" y="456" class="txt">catchup lag monitored</text>

  <path class="line" d="M250 210 L350 210"/>
  <path class="line" d="M250 430 L350 430"/>
  <path class="line" d="M250 210 C300 210 300 430 350 430"/>
  <path class="line" d="M250 430 C300 430 300 210 350 210"/>

  <rect x="710" y="245" width="240" height="150" class="orange"/>
  <text x="745" y="288" class="label">Publisher Control</text>
  <text x="745" y="320" class="txt">leader / lease / fencing</text>
  <text x="745" y="346" class="txt">or idempotent multi-publish</text>

  <path class="line" d="M595 210 C650 210 660 300 710 300"/>
  <path class="line" d="M595 430 C650 430 660 350 710 350"/>

  <rect x="1060" y="245" width="190" height="150" class="box"/>
  <text x="1102" y="288" class="label">Downstream</text>
  <text x="1090" y="320" class="txt">dedupe by key</text>
  <text x="1090" y="346" class="txt">read trust status</text>
  <path class="line" d="M950 320 L1060 320"/>

  <rect x="70" y="590" width="1180" height="84" class="red"/>
  <text x="100" y="625" class="label">Failover guard</text>
  <text x="100" y="657" class="txt">Only publish after standby channel is HEALTHY, state is TRUSTED, lastAppliedSeq is near lastReceivedSeq, and no critical gap is open.</text>
</svg>
