<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Thin receiver pipeline</title>
  <desc id="desc">The receiver thread only receives packets, wraps metadata, and dispatches work to parser and state workers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f2f3a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="70" y="78" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Keep the Receiver Thread Thin</text>
  <text x="70" y="116" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">UDP socket buffers are finite. Slow receiver logic turns into packet loss.</text>

  <rect x="70" y="245" width="100" height="92" rx="18" fill="#083344" stroke="#67e8f9" stroke-width="2"/>
  <text x="120" y="285" text-anchor="middle" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">NIC</text>
  <text x="120" y="314" text-anchor="middle" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="15">packets</text>
  <path d="M 178 291 L 250 291" stroke="#22d3ee" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="270" y="205" width="220" height="172" rx="22" fill="#164e63" stroke="#67e8f9" stroke-width="2"/>
  <text x="380" y="250" text-anchor="middle" fill="#ecfeff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Receiver Thread</text>
  <text x="310" y="292" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="18">1. receive</text>
  <text x="310" y="325" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="18">2. wrap metadata</text>
  <text x="310" y="358" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="18">3. dispatch</text>
  <path d="M 500 291 L 578 291" stroke="#22d3ee" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="600" y="225" width="160" height="132" rx="20" fill="#0f172a" stroke="#93c5fd" stroke-width="2"/>
  <text x="680" y="277" text-anchor="middle" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Queue</text>
  <text x="680" y="312" text-anchor="middle" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="16">partitioned</text>
  <path d="M 770 291 L 838 216" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 770 291 L 838 291" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 770 291 L 838 366" stroke="#22d3ee" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="860" y="155" width="240" height="70" rx="16" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2"/>
  <rect x="860" y="255" width="240" height="70" rx="16" fill="#14532d" stroke="#86efac" stroke-width="2"/>
  <rect x="860" y="355" width="240" height="70" rx="16" fill="#4a044e" stroke="#f0abfc" stroke-width="2"/>
  <text x="980" y="199" text-anchor="middle" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Parser Worker</text>
  <text x="980" y="299" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">State Builder</text>
  <text x="980" y="399" text-anchor="middle" fill="#fae8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Publisher</text>

  <rect x="120" y="470" width="960" height="70" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="600" y="514" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">No database writes, remote calls, heavy logging, or long locks in the receiver thread.</text>
</svg>
