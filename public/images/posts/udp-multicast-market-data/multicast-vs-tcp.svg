<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">TCP fanout versus UDP multicast</title>
  <desc id="desc">A comparison between TCP fanout and UDP multicast for market data distribution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#12342f"/>
    </linearGradient>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2b84b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42d392"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <text x="70" y="76" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Market Data Distribution Model</text>
  <text x="70" y="114" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">The exchange sends one market event. TCP scales by connections; multicast scales by the network.</text>

  <rect x="70" y="160" width="500" height="430" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="630" y="160" width="500" height="430" rx="22" fill="#0b1f1c" stroke="#2f6d58" stroke-width="2"/>

  <text x="110" y="215" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">TCP Fanout</text>
  <text x="670" y="215" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">UDP Multicast</text>

  <rect x="235" y="260" width="170" height="66" rx="14" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
  <text x="320" y="300" text-anchor="middle" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Exchange</text>
  <path d="M 320 330 C 180 380 150 430 150 485" fill="none" stroke="#f2b84b" stroke-width="5" marker-end="url(#arrowYellow)"/>
  <path d="M 320 330 C 320 385 320 430 320 485" fill="none" stroke="#f2b84b" stroke-width="5" marker-end="url(#arrowYellow)"/>
  <path d="M 320 330 C 460 380 490 430 490 485" fill="none" stroke="#f2b84b" stroke-width="5" marker-end="url(#arrowYellow)"/>

  <rect x="103" y="485" width="94" height="58" rx="12" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
  <rect x="273" y="485" width="94" height="58" rx="12" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
  <rect x="443" y="485" width="94" height="58" rx="12" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
  <text x="150" y="520" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client A</text>
  <text x="320" y="520" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client B</text>
  <text x="490" y="520" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client C</text>
  <text x="115" y="565" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="16">Per-client connections, buffers, retransmission, flow control.</text>

  <rect x="795" y="250" width="170" height="62" rx="14" fill="#12342f" stroke="#8be9c1" stroke-width="2"/>
  <text x="880" y="288" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Exchange</text>
  <rect x="795" y="352" width="170" height="62" rx="14" fill="#143b35" stroke="#8be9c1" stroke-width="2"/>
  <text x="880" y="390" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Multicast Group</text>
  <path d="M 880 314 L 880 348" fill="none" stroke="#42d392" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M 880 418 C 745 438 730 458 730 490" fill="none" stroke="#42d392" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M 880 418 L 880 490" fill="none" stroke="#42d392" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M 880 418 C 1015 438 1030 458 1030 490" fill="none" stroke="#42d392" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <rect x="683" y="490" width="94" height="58" rx="12" fill="#0a1f1b" stroke="#8be9c1" stroke-width="2"/>
  <rect x="833" y="490" width="94" height="58" rx="12" fill="#0a1f1b" stroke="#8be9c1" stroke-width="2"/>
  <rect x="983" y="490" width="94" height="58" rx="12" fill="#0a1f1b" stroke="#8be9c1" stroke-width="2"/>
  <text x="730" y="525" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client A</text>
  <text x="880" y="525" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client B</text>
  <text x="1030" y="525" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client C</text>
  <text x="675" y="565" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="16">One send from exchange; network replicates; clients own recovery.</text>
</svg>
