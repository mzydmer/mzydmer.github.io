<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Runtime performance model for multicast market data</title>
  <desc id="desc">Market-data bursts can create pressure at receiver, parser, partition, transfer, GC, direct memory, and machine resource layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#10352f"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="660" rx="28" fill="url(#bg)"/>
  <text x="70" y="76" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Low Latency Is Tail Stability Under Burst</text>
  <text x="70" y="114" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">Average latency is not enough. The system must protect the hot path when market data arrives in clusters.</text>
  <rect x="72" y="188" width="175" height="78" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <rect x="302" y="188" width="175" height="78" rx="18" fill="#164e63" stroke="#67e8f9" stroke-width="2"/>
  <rect x="532" y="188" width="175" height="78" rx="18" fill="#365314" stroke="#bef264" stroke-width="2"/>
  <rect x="762" y="188" width="175" height="78" rx="18" fill="#713f12" stroke="#fde68a" stroke-width="2"/>
  <rect x="992" y="188" width="135" height="78" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2"/>
  <text x="160" y="235" text-anchor="middle" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Receiver</text>
  <text x="390" y="235" text-anchor="middle" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Parse</text>
  <text x="620" y="235" text-anchor="middle" fill="#ecfccb" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Partition</text>
  <text x="850" y="235" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Transfer</text>
  <text x="1060" y="235" text-anchor="middle" fill="#fee2e2" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Client</text>
  <path d="M 253 227 L 294 227" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 483 227 L 524 227" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 713 227 L 754 227" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 943 227 L 984 227" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="100" y="360" width="1000" height="165" rx="24" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="145" y="410" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900">Tail-risk sources</text>
  <g fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">
    <text x="145" y="455">socket buffer overflow</text>
    <text x="145" y="495">hot channel single-worker pressure</text>
    <text x="490" y="455">GC pause / safepoint</text>
    <text x="490" y="495">direct memory pressure</text>
    <text x="790" y="455">slow consumer backlog</text>
    <text x="790" y="495">CPU / NIC / kernel imbalance</text>
  </g>
  <text x="70" y="598" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Goal: p99 / p999 latency remains bounded while receiver_lag, parse_lag, and transfer_lag do not grow.</text>
</svg>
